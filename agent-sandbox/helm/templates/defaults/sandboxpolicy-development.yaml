{{- if .Values.installDefaultPolicies }}
apiVersion: agent.openchoreo.dev/v1alpha1
kind: SandboxPolicy
metadata:
  name: development
  namespace: {{ .Values.namespace }}
  annotations:
    openchoreo.dev/description: |
      Wide egress policy for development environments.
      Allows outbound access to common package registries, LLM APIs, and source hosts.
      Do NOT use in production.
spec:
  defaultEgress: allow
  allowedHosts:
    # Python packages
    - host: pypi.org
      ports: [443]
    - host: files.pythonhosted.org
      ports: [443]
    # Node packages
    - host: registry.npmjs.org
      ports: [443]
    # Source code
    - host: github.com
      ports: [443]
    - host: raw.githubusercontent.com
      ports: [443]
    # Common LLM APIs
    - host: api.openai.com
      ports: [443]
    - host: api.anthropic.com
      ports: [443]
    - host: generativelanguage.googleapis.com
      ports: [443]
    - host: api.mistral.ai
      ports: [443]
    - host: api.cohere.com
      ports: [443]
{{- end }}
