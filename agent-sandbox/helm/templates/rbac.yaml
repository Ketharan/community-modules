apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sandbox-controller
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-controller
rules:
  # Read/update Components and their status
  - apiGroups: [openchoreo.dev]
    resources: [components]
    verbs: [get, list, watch]
  - apiGroups: [openchoreo.dev]
    resources: [components/status, components/finalizers]
    verbs: [get, update, patch]
  # Read ClusterComponentTypes, ClusterTraits, Traits, Workloads
  - apiGroups: [openchoreo.dev]
    resources: [clustercomponenttypes, clustertraits, traits, workloads]
    verbs: [get, list, watch]
  # Read Project and DeploymentPipeline for environment resolution
  - apiGroups: [openchoreo.dev]
    resources: [projects, deploymentpipelines]
    verbs: [get, list, watch]
  # Create/update ComponentRelease and ReleaseBinding
  - apiGroups: [openchoreo.dev]
    resources: [componentreleases, releasebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  # Full control over SandboxPolicy
  - apiGroups: [agent.openchoreo.dev]
    resources: [sandboxpolicies, sandboxpolicies/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # Create/update NetworkPolicy for egress enforcement
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  # Interact with the upstream kubernetes-sigs/agent-sandbox controller.
  # SandboxTemplate, SandboxClaim, and SandboxWarmPool live in the extensions API group.
  - apiGroups: [extensions.agents.x-k8s.io]
    resources: [sandboxtemplates, sandboxclaims, sandboxwarmpools]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [extensions.agents.x-k8s.io]
    resources: [sandboxclaims/status, sandboxwarmpools/status]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-sandbox-controller
subjects:
  - kind: ServiceAccount
    name: agent-sandbox-controller
    namespace: {{ .Values.namespace }}
