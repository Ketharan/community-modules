apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-ai-agent-opencode
  title: OpenCode Agent
  description: Run the multi-provider OpenCode CLI in a kernel-isolated sandbox.
  tags:
    - openchoreo
    - ai-agent
    - opencode
spec:
  type: Component
  owner: openchoreo

  # Injects the logged-in user's token so the create action authorizes as them.
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token

  parameters:
    - title: Component Metadata
      required:
        - project_namespace
        - name
      properties:
        project_namespace:
          title: Project & Namespace
          type: object
          description: The OpenChoreo project and namespace to create the component in.
          ui:field: ProjectNamespaceField
        name:
          title: Component Name
          type: string
          description: A unique name for the component (lowercase, DNS-compatible).
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
          maxLength: 63
          ui:autofocus: true
        displayName:
          title: Display Name
          type: string
          description: A human-friendly name shown in the portal.
        description:
          title: Description
          type: string
          description: A short description of what this agent does.

    - title: Agent Configuration
      required:
        - llmProvider
        - llmApiKey
      properties:
        llmProvider:
          title: LLM Provider
          type: string
          description: The LLM provider OpenCode should use. OpenCode auto-detects the matching API key env var.
          default: anthropic
          enum:
            - anthropic
            - openai
            - openrouter
          enumNames:
            - Anthropic (Claude)
            - OpenAI
            - OpenRouter
        llmApiKey:
          title: LLM Provider API Key
          type: string
          description: The API key for the selected provider.
          ui:field: Secret
      # Each branch sets the hidden provider key env var and the models.dev
      # model IDs (always in `provider/model` form) OpenCode accepts.
      dependencies:
        llmProvider:
          oneOf:
            - required: [model]
              properties:
                llmProvider:
                  const: anthropic
                apiKeyEnvVar:
                  type: string
                  default: ANTHROPIC_API_KEY
                  ui:widget: hidden
                model:
                  title: Model
                  type: string
                  default: anthropic/claude-sonnet-4-6
                  enum:
                    - anthropic/claude-opus-4-8
                    - anthropic/claude-sonnet-4-6
                    - anthropic/claude-haiku-4-5
            - required: [model]
              properties:
                llmProvider:
                  const: openai
                apiKeyEnvVar:
                  type: string
                  default: OPENAI_API_KEY
                  ui:widget: hidden
                model:
                  title: Model
                  type: string
                  default: openai/gpt-5.2
                  enum:
                    - openai/gpt-5.2
                    - openai/gpt-5.1
                    - openai/gpt-5-mini
            - required: [model]
              properties:
                llmProvider:
                  const: openrouter
                apiKeyEnvVar:
                  type: string
                  default: OPENROUTER_API_KEY
                  ui:widget: hidden
                model:
                  title: Model
                  type: string
                  default: openrouter/openrouter/auto
                  enum:
                    - openrouter/openrouter/auto
                    - openrouter/anthropic/claude-sonnet-4.6
                    - openrouter/deepseek/deepseek-chat

  steps:
    - id: create-component
      name: Create Component
      action: openchoreo:component:create
      input:
        projectName: ${{ parameters.project_namespace.project_name }}
        namespaceName: ${{ parameters.project_namespace.namespace_name }}
        componentName: ${{ parameters.name }}
        displayName: ${{ parameters.displayName }}
        description: ${{ parameters.description }}
        componentType: ai-agent-opencode
        component_type_kind: ClusterComponentType
        component_type_workload_type: proxy
        # Must be deploy-from-image, or the action drops the image and env vars.
        deploymentSource: deploy-from-image
        containerImage: docker/sandbox-templates:opencode
        autoDeploy: true
        # Terminal-only: no endpoints. Reach it with `kubectl exec -it <pod> -- opencode`.
        workloadDetails:
          envVars:
            - key: ${{ parameters.apiKeyEnvVar }}
              value: ${{ secrets.llmApiKey }}
            # Points OpenCode at the read-only mounted config below (no `opencode auth login` needed).
            - key: OPENCODE_CONFIG
              value: /etc/opencode/opencode.json
          # Sets the default model so the agent works without an interactive model picker.
          fileMounts:
            - key: opencode.json
              mountPath: /etc/opencode
              value: |
                {
                  "$schema": "https://opencode.ai/config.json",
                  "model": "${{ parameters.model }}"
                }

  output:
    links:
      - title: View Component
        icon: kind:component
        entityRef: component:${{ steps['create-component'].output.namespaceName }}/${{ steps['create-component'].output.componentName }}
