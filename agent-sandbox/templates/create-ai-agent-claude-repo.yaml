apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-ai-agent-claude-repo
  title: Claude Code Agent (with Repo)
  description: Run Claude Code on a Git repository cloned into a kernel-isolated sandbox.
  tags:
    - openchoreo
    - ai-agent
    - claude
spec:
  type: Component
  owner: openchoreo

  # Injects the logged-in user's token so the create action authorizes as them.
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token

  parameters:
    - title: Component Metadata
      required:
        - project_namespace
        - name
      properties:
        project_namespace:
          title: Project & Namespace
          type: object
          description: The OpenChoreo project and namespace to create the component in.
          ui:field: ProjectNamespaceField
        name:
          title: Component Name
          type: string
          description: A unique name for the component (lowercase, DNS-compatible).
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
          maxLength: 63
          ui:autofocus: true
        displayName:
          title: Display Name
          type: string
          description: A human-friendly name shown in the portal.
        description:
          title: Description
          type: string
          description: A short description of what this agent does.

    - title: Repository
      required:
        - gitRepoUrl
      properties:
        gitRepoUrl:
          title: Git Repository URL
          type: string
          description: HTTPS URL of the repository to clone into the sandbox (e.g. https://github.com/org/repo.git).
        gitRef:
          title: Branch / Tag / Commit
          type: string
          description: The ref to check out. Leave blank for the repository's default branch.
        gitToken:
          title: Git Access Token
          type: string
          description: Access token for private repositories (e.g. a GitHub PAT). Leave blank for public repos.
          ui:field: Secret

    - title: Agent Configuration
      required:
        - model
        - anthropicApiKey
      properties:
        model:
          title: Model
          type: string
          description: The Anthropic model Claude Code runs on (ANTHROPIC_MODEL env var).
          default: claude-sonnet-4-6
          enum:
            - claude-opus-4-8
            - claude-sonnet-4-6
            - claude-haiku-4-5
          enumNames:
            - Claude Opus 4.8
            - Claude Sonnet 4.6
            - Claude Haiku 4.5
        anthropicApiKey:
          title: Anthropic API Key
          type: string
          description: The Anthropic API key Claude Code uses (ANTHROPIC_API_KEY).
          ui:field: Secret

  steps:
    - id: create-component
      name: Create Component
      action: openchoreo:component:create
      input:
        projectName: ${{ parameters.project_namespace.project_name }}
        namespaceName: ${{ parameters.project_namespace.namespace_name }}
        componentName: ${{ parameters.name }}
        displayName: ${{ parameters.displayName }}
        description: ${{ parameters.description }}
        componentType: ai-agent-claude-repo
        component_type_kind: ClusterComponentType
        component_type_workload_type: proxy
        # Must be deploy-from-image, or the action drops the image and env vars.
        deploymentSource: deploy-from-image
        containerImage: docker/sandbox-templates:claude-code
        autoDeploy: true
        # Terminal-only: no endpoints. The repo is cloned to /workspace/repo by an
        # init container; reach the agent with `kubectl exec -it <pod> -- claude`.
        workloadDetails:
          envVars:
            - key: ANTHROPIC_API_KEY
              value: ${{ secrets.anthropicApiKey }}
            - key: ANTHROPIC_MODEL
              value: ${{ parameters.model }}
            - key: GIT_REPO_URL
              value: ${{ parameters.gitRepoUrl }}
            - key: GIT_REF
              value: ${{ parameters.gitRef }}
            # Sentinel default keeps the secret non-empty for public repos; the
            # clone's credential helper only sends it when the repo returns 401.
            - key: GIT_TOKEN
              value: ${{ secrets.gitToken | default('x-no-token', true) }}

  output:
    links:
      - title: View Component
        icon: kind:component
        entityRef: component:${{ steps['create-component'].output.namespaceName }}/${{ steps['create-component'].output.componentName }}
