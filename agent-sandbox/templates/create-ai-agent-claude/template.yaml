apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-ai-agent-claude
  title: Claude AI Agent
  description: >-
    Create a Claude AI agent component. The agent runs as a fixed, pre-built
    image inside a kernel-isolated sandbox (kubernetes-sigs/agent-sandbox).
    No build or deploy steps are required — just provide your Anthropic API key.
  tags:
    - openchoreo
    - ai-agent
    - claude
spec:
  type: Component
  owner: openchoreo

  parameters:
    - title: Component Metadata
      required:
        - project_namespace
        - name
      properties:
        # FIX 1: use the registered ProjectNamespaceField (was the invalid
        # OpenChoreoProjectPicker, which rendered as an unlabelled bare input).
        # It outputs an object: { project_name, namespace_name }.
        project_namespace:
          title: Project & Namespace
          type: object
          description: The OpenChoreo project and namespace to create the component in.
          ui:field: ProjectNamespaceField
        name:
          title: Component Name
          type: string
          description: A unique name for the component (lowercase, DNS-compatible).
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
          maxLength: 63
          ui:autofocus: true
        displayName:
          title: Display Name
          type: string
          description: A human-friendly name shown in the portal.
        description:
          title: Description
          type: string
          description: A short description of what this agent does.

    - title: Agent Configuration
      required:
        - anthropicApiKey
      properties:
        anthropicApiKey:
          title: Anthropic API Key
          type: string
          description: >-
            Your Anthropic API key. Injected into the agent container as the
            ANTHROPIC_API_KEY environment variable.
          # FIX 2: secure secret field (was ui:widget: password, which Backstage
          # rejects). The value is available under `secrets`, not `parameters`.
          ui:field: Secret

  steps:
    - id: create-component
      name: Create Component
      action: openchoreo:component:create
      input:
        # project/namespace now come from the ProjectNamespaceField object
        projectName: ${{ parameters.project_namespace.project_name }}
        namespaceName: ${{ parameters.project_namespace.namespace_name }}
        componentName: ${{ parameters.name }}
        displayName: ${{ parameters.displayName }}
        description: ${{ parameters.description }}
        componentType: ai-agent-claude
        component_type_kind: ClusterComponentType
        component_type_workload_type: proxy
        containerImage: ttl.sh/claude-sandbox-v2:24h
        # env vars are nested under workloadDetails with { key, value } shape
        # (top-level envVars is rejected by the action's input schema)
        workloadDetails:
          envVars:
            - key: ANTHROPIC_API_KEY
              # secret is read from the secrets context, not parameters
              value: ${{ secrets.anthropicApiKey }}

  output:
    links:
      - title: View Component
        icon: catalog
        entityRef: ${{ steps['create-component'].output.entityRef }}
